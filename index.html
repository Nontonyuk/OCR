<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Subtitle OCR Studio</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  margin-bottom:20px;
}

.upload{
  margin-bottom:20px;
}

input[type=file]{
  width:100%;
  padding:14px;
  border-radius:10px;
  background:#111923;
  color:white;
  border:1px solid #2b3949;
}

.video-wrap{
  display:none;
}

.video-stage{
  position:relative;
  width:100%;
  background:black;
  overflow:hidden;
  border-radius:12px;
}

video{
  width:100%;
  display:block;
}

#cropBox{
  position:absolute;
  border:3px solid #00d2ff;
  background:rgba(0,210,255,.08);
  z-index:10;
}

#moveArea{
  position:absolute;
  inset:0;
  cursor:move;
}

.handle{
  position:absolute;
  background:#00d2ff;
  z-index:20;
}

.handle.top,
.handle.bottom{
  left:0;
  right:0;
  height:18px;
  cursor:ns-resize;
}

.handle.left,
.handle.right{
  top:0;
  bottom:0;
  width:18px;
  cursor:ew-resize;
}

.handle.top{
  top:-9px;
}

.handle.bottom{
  bottom:-9px;
}

.handle.left{
  left:-9px;
}

.handle.right{
  right:-9px;
}

#darkTop,
#darkBottom,
#darkLeft,
#darkRight{
  position:absolute;
  background:rgba(0,0,0,.65);
  pointer-events:none;
}

#cropLabel{
  position:absolute;
  top:6px;
  left:8px;
  background:rgba(0,0,0,.7);
  color:#00d2ff;
  font-size:12px;
  padding:4px 8px;
  border-radius:5px;
}

.controls{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  background:#00d2ff;
  color:black;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.preview{
  margin-top:25px;
  background:#111923;
  border-radius:12px;
  padding:20px;
}

.preview h2{
  margin-bottom:15px;
}

#ocrText{
  white-space:pre-wrap;
  line-height:1.8;
  font-size:18px;
  color:#00ffae;
}

#status{
  margin-top:10px;
  color:#8da2b8;
  font-size:14px;
}

.crop-info{
  margin-top:10px;
  color:#8da2b8;
}

canvas{
  display:none;
}

</style>
</head>
<body>

<div class="container">

<h1>Subtitle OCR Studio</h1>

<div class="upload">
  <input type="file" id="fileInput" accept="video/*">
</div>

<div class="video-wrap" id="videoWrap">

  <div class="video-stage" id="videoStage">

    <video id="video" controls></video>

    <!-- DARK AREAS -->
    <div id="darkTop"></div>
    <div id="darkBottom"></div>
    <div id="darkLeft"></div>
    <div id="darkRight"></div>

    <!-- CROP -->
    <div id="cropBox">

      <div id="cropLabel">
        SUBTITLE AREA
      </div>

      <div class="handle top" id="topHandle"></div>
      <div class="handle bottom" id="bottomHandle"></div>
      <div class="handle left" id="leftHandle"></div>
      <div class="handle right" id="rightHandle"></div>

      <div id="moveArea"></div>

    </div>

  </div>

  <div class="crop-info" id="cropInfo"></div>

  <div class="controls">

    <button onclick="presetBottom()">
      Bottom
    </button>

    <button onclick="presetMiddle()">
      Middle
    </button>

    <button onclick="presetTop()">
      Top
    </button>

    <button onclick="testOCR()">
      TEST OCR
    </button>

  </div>

</div>

<div class="preview">

  <h2>OCR PREVIEW</h2>

  <div id="ocrText">
    Belum ada OCR...
  </div>

  <div id="status"></div>

</div>

</div>

<script>

let cropXPct = 15;
let cropYPct = 75;
let cropWPct = 70;
let cropHPct = 16;

const video = document.getElementById('video');

document
.getElementById('fileInput')
.addEventListener('change',e=>{

  const file = e.target.files[0];

  if(!file) return;

  video.src = URL.createObjectURL(file);

  document
  .getElementById('videoWrap')
  .style.display='block';

  video.onloadedmetadata=()=>{

    renderCrop();
    initDrag();

  };

});

function renderCrop(){

  const stage =
  document.getElementById('videoStage');

  const crop =
  document.getElementById('cropBox');

  const w = stage.clientWidth;
  const h = stage.clientHeight;

  const left =
  cropXPct/100*w;

  const top =
  cropYPct/100*h;

  const width =
  cropWPct/100*w;

  const height =
  cropHPct/100*h;

  crop.style.left=left+'px';
  crop.style.top=top+'px';

  crop.style.width=width+'px';
  crop.style.height=height+'px';

  // DARK AREAS

  const darkTop =
  document.getElementById('darkTop');

  darkTop.style.left='0px';
  darkTop.style.top='0px';
  darkTop.style.width='100%';
  darkTop.style.height=top+'px';

  const darkBottom =
  document.getElementById('darkBottom');

  darkBottom.style.left='0px';
  darkBottom.style.top=(top+height)+'px';
  darkBottom.style.width='100%';
  darkBottom.style.height=
  (h-(top+height))+'px';

  const darkLeft =
  document.getElementById('darkLeft');

  darkLeft.style.left='0px';
  darkLeft.style.top=top+'px';
  darkLeft.style.width=left+'px';
  darkLeft.style.height=height+'px';

  const darkRight =
  document.getElementById('darkRight');

  darkRight.style.left=(left+width)+'px';
  darkRight.style.top=top+'px';

  darkRight.style.width=
  (w-(left+width))+'px';

  darkRight.style.height=height+'px';

  document
  .getElementById('cropInfo')
  .innerHTML=
  `
  X:${cropXPct.toFixed(1)}%
  |
  Y:${cropYPct.toFixed(1)}%
  |
  W:${cropWPct.toFixed(1)}%
  |
  H:${cropHPct.toFixed(1)}%
  `;

}

function initDrag(){

  const stage =
  document.getElementById('videoStage');

  const handles = {

    top:
    document.getElementById('topHandle'),

    bottom:
    document.getElementById('bottomHandle'),

    left:
    document.getElementById('leftHandle'),

    right:
    document.getElementById('rightHandle'),

    move:
    document.getElementById('moveArea')

  };

  function bind(el,type){

    let startX,startY;
    let sx,sy,sw,sh;

    function down(e){

      e.preventDefault();

      startX =
      e.touches?.[0]?.clientX ||
      e.clientX;

      startY =
      e.touches?.[0]?.clientY ||
      e.clientY;

      sx=cropXPct;
      sy=cropYPct;
      sw=cropWPct;
      sh=cropHPct;

      window.addEventListener(
        'mousemove',
        move
      );

      window.addEventListener(
        'mouseup',
        up
      );

      window.addEventListener(
        'touchmove',
        move,
        {passive:false}
      );

      window.addEventListener(
        'touchend',
        up
      );

    }

    function move(e){

      e.preventDefault();

      const x =
      e.touches?.[0]?.clientX ||
      e.clientX;

      const y =
      e.touches?.[0]?.clientY ||
      e.clientY;

      const dx =
      (x-startX)/
      stage.clientWidth*100;

      const dy =
      (y-startY)/
      stage.clientHeight*100;

      if(type==='move'){

        cropXPct=sx+dx;
        cropYPct=sy+dy;

      }

      if(type==='top'){

        cropYPct=sy+dy;
        cropHPct=sh-dy;

      }

      if(type==='bottom'){

        cropHPct=sh+dy;

      }

      if(type==='left'){

        cropXPct=sx+dx;
        cropWPct=sw-dx;

      }

      if(type==='right'){

        cropWPct=sw+dx;

      }

      cropXPct=
      Math.max(
        0,
        Math.min(95,cropXPct)
      );

      cropYPct=
      Math.max(
        0,
        Math.min(95,cropYPct)
      );

      cropWPct=
      Math.max(
        5,
        Math.min(
          100-cropXPct,
          cropWPct
        )
      );

      cropHPct=
      Math.max(
        5,
        Math.min(
          100-cropYPct,
          cropHPct
        )
      );

      renderCrop();

    }

    function up(){

      window.removeEventListener(
        'mousemove',
        move
      );

      window.removeEventListener(
        'mouseup',
        up
      );

      window.removeEventListener(
        'touchmove',
        move
      );

      window.removeEventListener(
        'touchend',
        up
      );

    }

    el.addEventListener(
      'mousedown',
      down
    );

    el.addEventListener(
      'touchstart',
      down,
      {passive:false}
    );

  }

  bind(handles.top,'top');
  bind(handles.bottom,'bottom');
  bind(handles.left,'left');
  bind(handles.right,'right');
  bind(handles.move,'move');

}

function presetBottom(){

  cropXPct=15;
  cropYPct=78;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

function presetMiddle(){

  cropXPct=15;
  cropYPct=42;
  cropWPct=70;
  cropHPct=16;

  renderCrop();

}

function presetTop(){

  cropXPct=15;
  cropYPct=8;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

async function testOCR(){

  if(!video.videoWidth) return;

  const status =
  document.getElementById('status');

  const ocrText =
  document.getElementById('ocrText');

  status.innerHTML='Preparing OCR...';

  const canvas =
  document.createElement('canvas');

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const ctx =
  canvas.getContext(
    '2d',
    {willReadFrequently:true}
  );

  ctx.drawImage(video,0,0);

  const vW = video.videoWidth;
  const vH = video.videoHeight;

  const cX =
  Math.floor(cropXPct/100*vW);

  const cY =
  Math.floor(cropYPct/100*vH);

  const cW =
  Math.floor(cropWPct/100*vW);

  const cH =
  Math.floor(cropHPct/100*vH);

  const crop =
  document.createElement('canvas');

  crop.width=cW;
  crop.height=cH;

  const cc =
  crop.getContext(
    '2d',
    {willReadFrequently:true}
  );

  cc.filter='grayscale(1) contrast(2)';

  cc.drawImage(
    canvas,
    cX,
    cY,
    cW,
    cH,
    0,
    0,
    cW,
    cH
  );

  const img =
  cc.getImageData(0,0,cW,cH);

  const px = img.data;

  for(let i=0;i<px.length;i+=4){

    const r = px[i];
    const g = px[i+1];
    const b = px[i+2];

    const bright =
      0.299*r+
      0.587*g+
      0.114*b;

    let val=0;

    if(bright>180){
      val=255;
    }

    px[i]=val;
    px[i+1]=val;
    px[i+2]=val;

  }

  cc.putImageData(img,0,0);

  const big =
  document.createElement('canvas');

  big.width=cW*3;
  big.height=cH*3;

  big
  .getContext('2d')
  .drawImage(
    crop,
    0,
    0,
    big.width,
    big.height
  );

  status.innerHTML='Running OCR...';

  const worker =
  await Tesseract.createWorker('ind+eng');

  await worker.setParameters({

    tessedit_pageseg_mode:'6',

    preserve_interword_spaces:'1',

    tessedit_char_whitelist:
    'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,?!:;\'"()- '

  });

  const result =
  await worker.recognize(big);

  await worker.terminate();

  ocrText.innerHTML=
  result.data.text || '(tidak ada teks)';

  status.innerHTML=
  `
  OCR Confidence:
  ${Math.round(result.data.confidence)}%
  `;

}

</script>

</body>
</html>
