<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Movie Subtitle Extractor
</title>

<link
rel="stylesheet"
href="css/style.css">

<script async
src="https://docs.opencv.org/4.x/opencv.js">
</script>

<script
src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js">
</script>

</head>

<body>

<div class="container">

<h1>
Movie Subtitle Extractor
</h1>

<div class="desc">
Ekstrak hard subtitle film menjadi file .srt langsung dari browser.
</div>

<div class="card">

<input
type="file"
id="fileInput"
accept="video/*">

</div>

<div
class="video-wrap"
id="videoWrap">

<div class="card">

<div
class="video-stage"
id="videoStage">

<video
id="video"
controls
playsinline>
</video>

<div class="dark" id="darkTop"></div>
<div class="dark" id="darkBottom"></div>
<div class="dark" id="darkLeft"></div>
<div class="dark" id="darkRight"></div>

<div id="cropBox">

<div id="cropLabel">
SUBTITLE AREA
</div>

<div class="handle top" id="topHandle"></div>
<div class="handle bottom" id="bottomHandle"></div>
<div class="handle left" id="leftHandle"></div>
<div class="handle right" id="rightHandle"></div>

<div id="moveArea"></div>

</div>

</div>

<div class="info" id="cropInfo"></div>

<div class="controls">

<button onclick="presetBottom()">
Bottom
</button>

<button onclick="presetMiddle()">
Middle
</button>

<button onclick="presetTop()">
Top
</button>

<button onclick="testOCR()">
TEST OCR
</button>

<button onclick="startSubtitleScan()">
START SCAN
</button>

</div>

</div>

</div>

<div class="card">

<h2>
Clean Subtitle
</h2>

<canvas id="cleanCanvas"></canvas>

</div>

<div class="card">

<h2>
OCR Preview
</h2>

<div id="ocrPreview">
Belum ada OCR...
</div>

<div id="status"></div>

<progress
id="scanProgress"
max="100"
value="0">
</progress>

</div>

<div class="card">

<h2>
SRT Result
</h2>

<textarea id="srtPreview"></textarea>

<div class="controls">

<button onclick="downloadSRT()">
DOWNLOAD SRT
</button>

</div>

</div>

</div>

<script src="js/app.js"></script>
<script src="js/ocr.js"></script>
<script src="js/subtitle.js"></script>
<script src="js/srt.js"></script>

</body>
</html>
