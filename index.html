<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Movie Subtitle Extractor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#070b12;
  color:white;
  font-family:'Inter',sans-serif;
  padding:18px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  font-size:32px;
  margin-bottom:10px;
  font-weight:800;
}

.desc{
  color:#9cb0c5;
  line-height:1.7;
  margin-bottom:20px;
}

.card{
  background:#101720;
  border:1px solid #223242;
  border-radius:18px;
  padding:18px;
  margin-bottom:20px;
}

input[type=file]{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#091018;
  color:white;
}

.video-wrap{
  display:none;
}

.video-stage{
  position:relative;
  overflow:hidden;
  border-radius:14px;
  background:black;
}

video{
  width:100%;
  display:block;
}

.dark{
  position:absolute;
  background:rgba(0,0,0,.75);
  pointer-events:none;
}

#cropBox{
  position:absolute;
  border:3px solid #00d2ff;
  background:rgba(0,210,255,.12);
  z-index:5;
}

#cropLabel{
  position:absolute;
  top:6px;
  left:6px;
  background:black;
  color:#00d2ff;
  font-size:11px;
  padding:4px 7px;
  border-radius:6px;
}

#moveArea{
  position:absolute;
  inset:0;
  cursor:move;
}

.handle{
  position:absolute;
  background:#00d2ff;
}

.handle.top,
.handle.bottom{
  left:0;
  right:0;
  height:22px;
  cursor:ns-resize;
}

.handle.left,
.handle.right{
  top:0;
  bottom:0;
  width:22px;
  cursor:ew-resize;
}

.handle.top{
  top:-11px;
}

.handle.bottom{
  bottom:-11px;
}

.handle.left{
  left:-11px;
}

.handle.right{
  right:-11px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  border:none;
  background:#00d2ff;
  color:black;
  padding:14px 18px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.info{
  margin-top:12px;
  color:#90a5b9;
  line-height:1.8;
  font-size:14px;
}

#ocrPreview{
  color:#00ff9d;
  line-height:1.8;
  white-space:pre-wrap;
  font-size:20px;
  min-height:80px;
}

#status{
  margin-top:12px;
  color:#9cb0c5;
  font-size:14px;
}

#cleanCanvas{
  width:100%;
  background:black;
  border-radius:12px;
}

textarea{
  width:100%;
  height:250px;
  background:#091018;
  border:1px solid #223242;
  border-radius:12px;
  padding:15px;
  color:#00ff9d;
  line-height:1.7;
  margin-top:15px;
}

progress{
  width:100%;
  height:20px;
  margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

<h1>Movie Subtitle Extractor</h1>

<div class="desc">
Ekstrak hard subtitle film menjadi file .srt langsung dari browser.
</div>

<div class="card">

<input type="file" id="fileInput" accept="video/*">

</div>

<div class="video-wrap" id="videoWrap">

<div class="card">

<div class="video-stage" id="videoStage">

<video id="video" controls playsinline></video>

<div class="dark" id="darkTop"></div>
<div class="dark" id="darkBottom"></div>
<div class="dark" id="darkLeft"></div>
<div class="dark" id="darkRight"></div>

<div id="cropBox">

<div id="cropLabel">
SUBTITLE AREA
</div>

<div class="handle top" id="topHandle"></div>
<div class="handle bottom" id="bottomHandle"></div>
<div class="handle left" id="leftHandle"></div>
<div class="handle right" id="rightHandle"></div>

<div id="moveArea"></div>

</div>

</div>

<div class="info" id="cropInfo"></div>

<div class="controls">

<button onclick="presetBottom()">
Bottom
</button>

<button onclick="presetMiddle()">
Middle
</button>

<button onclick="presetTop()">
Top
</button>

<button onclick="testOCR()">
TEST OCR
</button>

<button onclick="startSubtitleScan()">
START SCAN
</button>

</div>

</div>

</div>

<div class="card">

<h2 style="margin-bottom:15px">
Clean Subtitle
</h2>

<canvas id="cleanCanvas"></canvas>

</div>

<div class="card">

<h2 style="margin-bottom:15px">
OCR Preview
</h2>

<div id="ocrPreview">
Belum ada OCR...
</div>

<div id="status"></div>

<progress
id="scanProgress"
max="100"
value="0">
</progress>

</div>

<div class="card">

<h2 style="margin-bottom:15px">
SRT Result
</h2>

<textarea id="srtPreview"></textarea>

<div class="controls">

<button onclick="downloadSRT()">
DOWNLOAD SRT
</button>

</div>

</div>

</div>

<script>

let cropXPct = 15;
let cropYPct = 76;
let cropWPct = 70;
let cropHPct = 14;

let subtitles = [];

let prevSubtitleFrame = null;

let currentSubtitle = '';

let subtitleStart = 0;

let subtitleHoldTime = 0;

const HOLD_DURATION = 1.0;

const MIN_SUB_DURATION = 1.2;

let scanStep = 0.8;

const video =
document.getElementById('video');

document
.getElementById('fileInput')
.addEventListener('change',e=>{

  const file =
  e.target.files[0];

  if(!file) return;

  video.src =
  URL.createObjectURL(file);

  document
  .getElementById('videoWrap')
  .style.display='block';

  video.onloadedmetadata=()=>{

    renderCrop();
    initCropDrag();

  };

});

function renderCrop(){

  const stage =
  document.getElementById('videoStage');

  const crop =
  document.getElementById('cropBox');

  const w =
  stage.clientWidth;

  const h =
  stage.clientHeight;

  const left =
  cropXPct/100*w;

  const top =
  cropYPct/100*h;

  const width =
  cropWPct/100*w;

  const height =
  cropHPct/100*h;

  crop.style.left=left+'px';
  crop.style.top=top+'px';
  crop.style.width=width+'px';
  crop.style.height=height+'px';

  document.getElementById('darkTop').style.cssText=
  `
  left:0;
  top:0;
  width:100%;
  height:${top}px;
  `;

  document.getElementById('darkBottom').style.cssText=
  `
  left:0;
  top:${top+height}px;
  width:100%;
  height:${h-(top+height)}px;
  `;

  document.getElementById('darkLeft').style.cssText=
  `
  left:0;
  top:${top}px;
  width:${left}px;
  height:${height}px;
  `;

  document.getElementById('darkRight').style.cssText=
  `
  left:${left+width}px;
  top:${top}px;
  width:${w-(left+width)}px;
  height:${height}px;
  `;

  document
  .getElementById('cropInfo')
  .innerHTML=
  `
  X:${cropXPct.toFixed(1)}%
  |
  Y:${cropYPct.toFixed(1)}%
  |
  W:${cropWPct.toFixed(1)}%
  |
  H:${cropHPct.toFixed(1)}%
  `;

}

function initCropDrag(){

  const stage =
  document.getElementById('videoStage');

  const handles={

    top:
    document.getElementById('topHandle'),

    bottom:
    document.getElementById('bottomHandle'),

    left:
    document.getElementById('leftHandle'),

    right:
    document.getElementById('rightHandle'),

    move:
    document.getElementById('moveArea')

  };

  function bind(el,type){

    let startX,startY;
    let sx,sy,sw,sh;

    function down(e){

      e.preventDefault();

      startX =
      e.touches?.[0]?.clientX ||
      e.clientX;

      startY =
      e.touches?.[0]?.clientY ||
      e.clientY;

      sx=cropXPct;
      sy=cropYPct;
      sw=cropWPct;
      sh=cropHPct;

      window.addEventListener(
        'mousemove',
        move
      );

      window.addEventListener(
        'mouseup',
        up
      );

      window.addEventListener(
        'touchmove',
        move,
        {passive:false}
      );

      window.addEventListener(
        'touchend',
        up
      );

    }

    function move(e){

      e.preventDefault();

      const x =
      e.touches?.[0]?.clientX ||
      e.clientX;

      const y =
      e.touches?.[0]?.clientY ||
      e.clientY;

      const dx =
      (x-startX)/
      stage.clientWidth*100;

      const dy =
      (y-startY)/
      stage.clientHeight*100;

      if(type==='move'){

        cropXPct=sx+dx;
        cropYPct=sy+dy;

      }

      if(type==='top'){

        cropYPct=sy+dy;
        cropHPct=sh-dy;

      }

      if(type==='bottom'){

        cropHPct=sh+dy;

      }

      if(type==='left'){

        cropXPct=sx+dx;
        cropWPct=sw-dx;

      }

      if(type==='right'){

        cropWPct=sw+dx;

      }

      cropXPct=
      Math.max(
        0,
        Math.min(95,cropXPct)
      );

      cropYPct=
      Math.max(
        0,
        Math.min(95,cropYPct)
      );

      cropWPct=
      Math.max(
        5,
        Math.min(
          100-cropXPct,
          cropWPct
        )
      );

      cropHPct=
      Math.max(
        5,
        Math.min(
          100-cropYPct,
          cropHPct
        )
      );

      renderCrop();

    }

    function up(){

      window.removeEventListener(
        'mousemove',
        move
      );

      window.removeEventListener(
        'mouseup',
        up
      );

      window.removeEventListener(
        'touchmove',
        move
      );

      window.removeEventListener(
        'touchend',
        up
      );

    }

    el.addEventListener(
      'mousedown',
      down
    );

    el.addEventListener(
      'touchstart',
      down,
      {passive:false}
    );

  }

  bind(handles.top,'top');
  bind(handles.bottom,'bottom');
  bind(handles.left,'left');
  bind(handles.right,'right');
  bind(handles.move,'move');

}

function presetBottom(){

  cropXPct=15;
  cropYPct=78;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

function presetMiddle(){

  cropXPct=15;
  cropYPct=42;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

function presetTop(){

  cropXPct=15;
  cropYPct=8;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

function isolateSubtitle(canvas){

  const src =
  cv.imread(canvas);

  const gray =
  new cv.Mat();

  cv.cvtColor(
    src,
    gray,
    cv.COLOR_RGBA2GRAY
  );

  const blur =
  new cv.Mat();

  cv.GaussianBlur(
    gray,
    blur,
    new cv.Size(3,3),
    0
  );

  cv.equalizeHist(
    blur,
    blur
  );

  const thresh =
  new cv.Mat();

  cv.adaptiveThreshold(
    blur,
    thresh,
    255,
    cv.ADAPTIVE_THRESH_GAUSSIAN_C,
    cv.THRESH_BINARY,
    11,
    2
  );

  const kernel =
  cv.Mat.ones(
    2,
    2,
    cv.CV_8U
  );

  cv.morphologyEx(
    thresh,
    thresh,
    cv.MORPH_OPEN,
    kernel
  );

  cv.dilate(
    thresh,
    thresh,
    kernel
  );

  const final =
  new cv.Mat();

  cv.resize(
    thresh,
    final,
    new cv.Size(
      thresh.cols*5,
      thresh.rows*5
    ),
    0,
    0,
    cv.INTER_CUBIC
  );

  cv.imshow(
    'cleanCanvas',
    final
  );

  src.delete();
  gray.delete();
  blur.delete();
  thresh.delete();
  kernel.delete();
  final.delete();

}

async function testOCR(){

  const canvas =
  document.createElement('canvas');

  canvas.width =
  video.videoWidth;

  canvas.height =
  video.videoHeight;

  const ctx =
  canvas.getContext('2d');

  ctx.drawImage(video,0,0);

  const vW =
  video.videoWidth;

  const vH =
  video.videoHeight;

  const cX =
  Math.floor(cropXPct/100*vW);

  const cY =
  Math.floor(cropYPct/100*vH);

  const cW =
  Math.floor(cropWPct/100*vW);

  const cH =
  Math.floor(cropHPct/100*vH);

  const crop =
  document.createElement('canvas');

  crop.width=cW;
  crop.height=cH;

  const cc =
  crop.getContext('2d');

  cc.drawImage(
    canvas,
    cX,
    cY,
    cW,
    cH,
    0,
    0,
    cW,
    cH
  );

  isolateSubtitle(crop);

  const worker =
  await Tesseract.createWorker(
    'ind+eng'
  );

  const result =
  await worker.recognize(
    document.getElementById('cleanCanvas')
  );

  await worker.terminate();

  document
  .getElementById('ocrPreview')
  .innerHTML =
  result.data.text;

  document
  .getElementById('status')
  .innerHTML =
  `
  OCR Confidence:
  ${Math.round(result.data.confidence)}%
  `;

}

function subtitleDifference(a,b){

  if(!a || !b)
    return 999;

  let diff = 0;

  for(let i=0;i<a.length;i+=4){

    diff += Math.abs(a[i]-b[i]);

  }

  return diff/(a.length/4);

}

function similarity(a,b){

  a=a.toLowerCase();
  b=b.toLowerCase();

  let same=0;

  for(
    let i=0;
    i<Math.min(a.length,b.length);
    i++
  ){

    if(a[i]===b[i]){
      same++;
    }

  }

  return same/
  Math.max(a.length,b.length);

}

function hasSubtitle(imageData){

  const px =
  imageData.data;

  let white=0;

  for(let i=0;i<px.length;i+=4){

    if(px[i]>240){
      white++;
    }

  }

  return (
    white/
    (imageData.width*imageData.height)
  ) > 0.01;

}

function cleanSubtitleText(text){

  return text

  .replace(/[^\w\s.,?!:;'"()-]/g,'')

  .replace(/\s+/g,' ')

  .trim();

}

async function startSubtitleScan(){

  subtitles=[];

  const worker =
  await Tesseract.createWorker(
    'ind+eng'
  );

  const duration =
  video.duration;

  let currentTime=0;

  while(currentTime<duration){

    document
    .getElementById(
      'scanProgress'
    )
    .value =
    (currentTime/duration)*100;

    video.currentTime =
    currentTime;

    await new Promise(
      r=>video.onseeked=r
    );

    const canvas =
    document.createElement('canvas');

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    const ctx =
    canvas.getContext('2d');

    ctx.drawImage(video,0,0);

    const vW =
    video.videoWidth;

    const vH =
    video.videoHeight;

    const cX =
    Math.floor(cropXPct/100*vW);

    const cY =
    Math.floor(cropYPct/100*vH);

    const cW =
    Math.floor(cropWPct/100*vW);

    const cH =
    Math.floor(cropHPct/100*vH);

    const crop =
    document.createElement('canvas');

    crop.width=cW;
    crop.height=cH;

    const cc =
    crop.getContext('2d');

    cc.drawImage(
      canvas,
      cX,
      cY,
      cW,
      cH,
      0,
      0,
      cW,
      cH
    );

    isolateSubtitle(crop);

    const cleanCanvas =
    document.getElementById(
      'cleanCanvas'
    );

    const cleanCtx =
    cleanCanvas.getContext('2d');

    const cleanData =
    cleanCtx.getImageData(
      0,
      0,
      cleanCanvas.width,
      cleanCanvas.height
    );

    if(!hasSubtitle(cleanData)){

      currentTime += scanStep;

      continue;

    }

    const diff =
    subtitleDifference(
      prevSubtitleFrame,
      cleanData.data
    );

    prevSubtitleFrame =
    cleanData.data;

    if(diff < 8){

      scanStep=1.2;

      currentTime += scanStep;

      continue;

    }

    scanStep=0.3;

    const result =
    await worker.recognize(
      cleanCanvas
    );

    const confidence =
    result.data.confidence;

    if(confidence < 45){

      currentTime += scanStep;

      continue;

    }

    const text =
    cleanSubtitleText(
      result.data.text
    );

    if(text.length < 3){

      currentTime += scanStep;

      continue;

    }

    const sim =
    similarity(
      currentSubtitle,
      text
    );

    if(sim >= 0.8){

      subtitleHoldTime =
      currentTime;

    }else{

      if(currentSubtitle){

        const dur =
        subtitleHoldTime -
        subtitleStart;

        if(dur > MIN_SUB_DURATION){

          subtitles.push({

            start:
            subtitleStart,

            end:
            subtitleHoldTime,

            text:
            currentSubtitle

          });

        }

      }

      currentSubtitle =
      text;

      subtitleStart =
      currentTime;

      subtitleHoldTime =
      currentTime;

      document
      .getElementById(
        'ocrPreview'
      )
      .innerHTML =
      text;

    }

    currentTime += scanStep;

  }

  if(currentSubtitle){

    subtitles.push({

      start:
      subtitleStart,

      end:
      duration,

      text:
      currentSubtitle

    });

  }

  await worker.terminate();

  mergeSubtitles();

  document
  .getElementById(
    'srtPreview'
  )
  .value =
  buildSRT();

}

function mergeSubtitles(){

  const merged=[];

  for(const sub of subtitles){

    const last =
    merged[
      merged.length-1
    ];

    if(
      last &&
      similarity(
        last.text,
        sub.text
      ) > 0.85
    ){

      last.end=sub.end;

    }else{

      merged.push(sub);

    }

  }

  subtitles=merged;

}

function srtTime(sec){

  const h =
  Math.floor(sec/3600);

  const m =
  Math.floor((sec%3600)/60);

  const s =
  Math.floor(sec%60);

  const ms =
  Math.floor(
    (sec-Math.floor(sec))*1000
  );

  return `${

    String(h).padStart(2,'0')

  }:${
    String(m).padStart(2,'0')
  }:${
    String(s).padStart(2,'0')
  },${
    String(ms).padStart(3,'0')
  }`;

}

function buildSRT(){

  let srt='';

  subtitles.forEach((sub,index)=>{

    srt +=
`${index+1}
${srtTime(sub.start)} --> ${srtTime(sub.end)}
${sub.text}

`;

  });

  return srt;

}

function downloadSRT(){

  const blob =
  new Blob(
    [buildSRT()],
    {type:'text/plain'}
  );

  const a =
  document.createElement('a');

  a.href =
  URL.createObjectURL(blob);

  a.download =
  'subtitle.srt';

  a.click();

}

</script>

</body>
  </html>
