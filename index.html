<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hard Subtitle Extractor</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b1018;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.wrap{
  max-width:1000px;
  margin:auto;
}

h1{
  margin-bottom:20px;
}

.upload{
  padding:20px;
  border:2px dashed #3b4a5c;
  border-radius:10px;
  text-align:center;
  margin-bottom:20px;
}

button{
  background:#00d2ff;
  color:#000;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

#videoBox{
  display:none;
}

.video-stage{
  position:relative;
  width:100%;
  background:#000;
  overflow:hidden;
  border-radius:12px;
}

video{
  width:100%;
  display:block;
}

#cropWindow{
  position:absolute;
  border:3px solid #00d2ff;
  background:rgba(0,210,255,.08);
  z-index:10;
}

#moveArea{
  position:absolute;
  inset:0;
  cursor:move;
}

.handle{
  position:absolute;
  background:#00d2ff;
  z-index:20;
}

.handle.top,
.handle.bottom{
  left:0;
  right:0;
  height:10px;
  cursor:ns-resize;
}

.handle.top{
  top:-5px;
}

.handle.bottom{
  bottom:-5px;
}

.handle.left,
.handle.right{
  top:0;
  bottom:0;
  width:10px;
  cursor:ew-resize;
}

.handle.left{
  left:-5px;
}

.handle.right{
  right:-5px;
}

#cropLabel{
  position:absolute;
  top:5px;
  left:8px;
  font-size:12px;
  color:#00d2ff;
  background:rgba(0,0,0,.6);
  padding:3px 6px;
  border-radius:4px;
}

.controls{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.settings{
  margin-top:15px;
  display:grid;
  gap:12px;
}

select,input{
  width:100%;
  padding:10px;
  background:#131b26;
  color:#fff;
  border:1px solid #2b3949;
  border-radius:8px;
}

.progress{
  margin-top:20px;
  display:none;
}

.bar{
  height:8px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#00d2ff;
}

#log{
  margin-top:15px;
  background:#111923;
  padding:12px;
  border-radius:10px;
  height:180px;
  overflow:auto;
  font-size:13px;
  line-height:1.7;
}

.result{
  display:none;
  margin-top:20px;
}

textarea{
  width:100%;
  height:250px;
  background:#111923;
  color:#fff;
  border:1px solid #2b3949;
  border-radius:10px;
  padding:15px;
}

.info{
  margin-top:10px;
  color:#9fb1c5;
  font-size:14px;
}
</style>
</head>
<body>

<div class="wrap">

<h1>Hard Subtitle Extractor</h1>

<div class="upload">
  <input type="file" id="fileInput" accept="video/*">
</div>

<div id="videoBox">

  <div class="video-stage" id="videoStage">

    <video id="video" controls></video>

    <div id="cropWindow">

      <div id="cropLabel">
        DRAG SUBTITLE AREA
      </div>

      <div class="handle top" id="handleTop"></div>
      <div class="handle bottom" id="handleBottom"></div>
      <div class="handle left" id="handleLeft"></div>
      <div class="handle right" id="handleRight"></div>

      <div id="moveArea"></div>

    </div>

  </div>

  <div class="info" id="cropInfo"></div>

  <div class="settings">

    <div>
      <label>Bahasa OCR</label>
      <select id="lang">
        <option value="eng">English</option>
        <option value="ind">Indonesia</option>
        <option value="ind+eng" selected>Indonesia + English</option>
      </select>
    </div>

    <div>
      <label>Scan tiap berapa detik</label>
      <select id="step">
        <option value="0.3">0.3 detik</option>
        <option value="0.5" selected>0.5 detik</option>
        <option value="1">1 detik</option>
      </select>
    </div>

    <div>
      <label>Threshold OCR</label>
      <input type="range" id="threshold" min="50" max="250" value="160">
    </div>

  </div>

  <div class="controls">
    <button onclick="startOCR()">START OCR</button>
    <button onclick="autoBottom()">AUTO BOTTOM</button>
  </div>

</div>

<div class="progress" id="progressBox">

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div id="status" style="margin-top:10px"></div>

  <div id="log"></div>

</div>

<div class="result" id="result">

  <h2>SRT RESULT</h2>

  <textarea id="srt"></textarea>

  <div class="controls">
    <button onclick="downloadSRT()">DOWNLOAD SRT</button>
  </div>

</div>

</div>

<script>

let cropXPct = 15;
let cropYPct = 75;
let cropWPct = 70;
let cropHPct = 18;

let videoFile = null;
let srtText = '';

const video = document.getElementById('video');

document.getElementById('fileInput').addEventListener('change', e=>{

  const file = e.target.files[0];
  if(!file) return;

  videoFile = file;

  video.src = URL.createObjectURL(file);

  document.getElementById('videoBox').style.display='block';

  video.onloadedmetadata = ()=>{

    renderCrop();
    initCropDrag();

  };

});

function renderCrop(){

  const stage = document.getElementById('videoStage');
  const crop = document.getElementById('cropWindow');

  const w = stage.clientWidth;
  const h = stage.clientHeight;

  crop.style.left = (cropXPct/100*w)+'px';
  crop.style.top = (cropYPct/100*h)+'px';

  crop.style.width = (cropWPct/100*w)+'px';
  crop.style.height = (cropHPct/100*h)+'px';

  document.getElementById('cropInfo').innerHTML =
  `
  X:${cropXPct.toFixed(1)}%
  |
  Y:${cropYPct.toFixed(1)}%
  |
  W:${cropWPct.toFixed(1)}%
  |
  H:${cropHPct.toFixed(1)}%
  `;

}

function initCropDrag(){

  const stage = document.getElementById('videoStage');

  const handles = {
    top: document.getElementById('handleTop'),
    bottom: document.getElementById('handleBottom'),
    left: document.getElementById('handleLeft'),
    right: document.getElementById('handleRight'),
    move: document.getElementById('moveArea')
  };

  function bind(el,type){

    let startX,startY;
    let sx,sy,sw,sh;

    function down(e){

      e.preventDefault();

      startX = e.touches?.[0]?.clientX || e.clientX;
      startY = e.touches?.[0]?.clientY || e.clientY;

      sx = cropXPct;
      sy = cropYPct;
      sw = cropWPct;
      sh = cropHPct;

      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);

      window.addEventListener('touchmove',move,{passive:false});
      window.addEventListener('touchend',up);

    }

    function move(e){

      e.preventDefault();

      const x = e.touches?.[0]?.clientX || e.clientX;
      const y = e.touches?.[0]?.clientY || e.clientY;

      const dx = (x-startX)/stage.clientWidth*100;
      const dy = (y-startY)/stage.clientHeight*100;

      if(type==='move'){
        cropXPct = sx+dx;
        cropYPct = sy+dy;
      }

      if(type==='top'){
        cropYPct = sy+dy;
        cropHPct = sh-dy;
      }

      if(type==='bottom'){
        cropHPct = sh+dy;
      }

      if(type==='left'){
        cropXPct = sx+dx;
        cropWPct = sw-dx;
      }

      if(type==='right'){
        cropWPct = sw+dx;
      }

      cropXPct = Math.max(0,Math.min(95,cropXPct));
      cropYPct = Math.max(0,Math.min(95,cropYPct));

      cropWPct = Math.max(5,Math.min(100-cropXPct,cropWPct));
      cropHPct = Math.max(5,Math.min(100-cropYPct,cropHPct));

      renderCrop();

    }

    function up(){

      window.removeEventListener('mousemove',move);
      window.removeEventListener('mouseup',up);

      window.removeEventListener('touchmove',move);
      window.removeEventListener('touchend',up);

    }

    el.addEventListener('mousedown',down);
    el.addEventListener('touchstart',down,{passive:false});

  }

  bind(handles.top,'top');
  bind(handles.bottom,'bottom');
  bind(handles.left,'left');
  bind(handles.right,'right');
  bind(handles.move,'move');

}

function autoBottom(){

  cropXPct = 15;
  cropYPct = 75;
  cropWPct = 70;
  cropHPct = 18;

  renderCrop();

}

function preprocess(ctx,w,h,thr){

  const img = ctx.getImageData(0,0,w,h);
  const px = img.data;

  for(let i=0;i<px.length;i+=4){

    const r = px[i];
    const g = px[i+1];
    const b = px[i+2];

    const bright =
      0.299*r +
      0.587*g +
      0.114*b;

    const edge =
      Math.abs(r-g)+
      Math.abs(g-b);

    let val = 0;

    if(bright > thr || (edge < 20 && bright > 120)){
      val = 255;
    }

    px[i]=val;
    px[i+1]=val;
    px[i+2]=val;

  }

  ctx.putImageData(img,0,0);

}

function normalizeText(t){

  return t
  .toLowerCase()
  .replace(/\s+/g,' ')
  .replace(/[^\w\s]/g,'')
  .trim();

}

function formatTime(sec){

  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = Math.floor(sec%60);
  const ms = Math.floor((sec-Math.floor(sec))*1000);

  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;

}

function log(msg){

  const div = document.createElement('div');
  div.textContent = msg;

  const logBox = document.getElementById('log');

  logBox.appendChild(div);

  logBox.scrollTop = logBox.scrollHeight;

}

async function startOCR(){

  if(!videoFile) return;

  document.getElementById('progressBox').style.display='block';

  log('Loading OCR engine...');

  const worker = await Tesseract.createWorker(
    document.getElementById('lang').value
  );

  await worker.setParameters({
    tessedit_pageseg_mode: '6'
  });

  log('OCR Ready');

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d',{willReadFrequently:true});

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const vW = video.videoWidth;
  const vH = video.videoHeight;

  const cX = Math.floor(cropXPct/100*vW);
  const cY = Math.floor(cropYPct/100*vH);

  const cW = Math.floor(cropWPct/100*vW);
  const cH = Math.floor(cropHPct/100*vH);

  const step = parseFloat(document.getElementById('step').value);

  const threshold = parseInt(document.getElementById('threshold').value);

  const duration = video.duration;

  let current = 0;

  let lastText = '';
  let lastNorm = '';

  let subStart = 0;

  let subs = [];

  while(current < duration){

    video.currentTime = current;

    await new Promise(r=>video.onseeked=r);

    ctx.drawImage(video,0,0);

    const crop = document.createElement('canvas');
    crop.width = cW;
    crop.height = cH;

    const cc = crop.getContext('2d',{willReadFrequently:true});

    cc.filter='grayscale(1) contrast(2)';

    cc.drawImage(
      canvas,
      cX,
      cY,
      cW,
      cH,
      0,
      0,
      cW,
      cH
    );

    preprocess(cc,cW,cH,threshold);

    const big = document.createElement('canvas');

    big.width = cW*2;
    big.height = cH*2;

    big.getContext('2d').drawImage(
      crop,
      0,
      0,
      big.width,
      big.height
    );

    const result = await worker.recognize(big);

    const text = result.data.text.trim();

    const norm = normalizeText(text);

    log(`[${current.toFixed(1)}s] ${text}`);

    if(norm && norm !== lastNorm){

      if(lastText){

        subs.push({
          start:subStart,
          end:current,
          text:lastText
        });

      }

      lastText = text;
      lastNorm = norm;
      subStart = current;

    }

    if(!norm && lastText){

      subs.push({
        start:subStart,
        end:current,
        text:lastText
      });

      lastText = '';
      lastNorm = '';

    }

    current += step;

    const pct = Math.floor(current/duration*100);

    document.getElementById('fill').style.width=pct+'%';

    document.getElementById('status').textContent =
    pct+'%';

    await new Promise(r=>setTimeout(r,30));

  }

  if(lastText){

    subs.push({
      start:subStart,
      end:duration,
      text:lastText
    });

  }

  await worker.terminate();

  srtText = '';

  subs.forEach((s,i)=>{

    srtText +=
`${i+1}
${formatTime(s.start)} --> ${formatTime(s.end)}
${s.text}

`;

  });

  document.getElementById('srt').value = srtText;

  document.getElementById('result').style.display='block';

  log('DONE');

}

function downloadSRT(){

  const blob = new Blob(
    [srtText],
    {type:'text/plain'}
  );

  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);

  a.download = 'subtitle.srt';

  a.click();

}

</script>

</body>
  </html>
