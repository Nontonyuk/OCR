<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Subtitle OCR Studio</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#070b12;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  margin-bottom:20px;
  font-size:40px;
}

.card{
  background:#111923;
  border:1px solid #233244;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
}

input[type=file]{
  width:100%;
  padding:16px;
  background:#0b1118;
  border:1px solid #233244;
  color:white;
  border-radius:12px;
}

.video-wrap{
  display:none;
}

.video-stage{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  background:black;
}

video{
  width:100%;
  display:block;
}

#cropBox{
  position:absolute;
  border:3px solid #00d2ff;
  background:rgba(0,210,255,.12);
  z-index:10;
}

#cropLabel{
  position:absolute;
  top:6px;
  left:6px;
  background:rgba(0,0,0,.8);
  color:#00d2ff;
  padding:5px 8px;
  font-size:12px;
  border-radius:6px;
}

#moveArea{
  position:absolute;
  inset:0;
  cursor:move;
}

.handle{
  position:absolute;
  background:#00d2ff;
  z-index:20;
}

.handle.top,
.handle.bottom{
  left:0;
  right:0;
  height:22px;
  cursor:ns-resize;
}

.handle.left,
.handle.right{
  top:0;
  bottom:0;
  width:22px;
  cursor:ew-resize;
}

.handle.top{top:-11px;}
.handle.bottom{bottom:-11px;}
.handle.left{left:-11px;}
.handle.right{right:-11px;}

.dark{
  position:absolute;
  background:rgba(0,0,0,.72);
  pointer-events:none;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  background:#00d2ff;
  color:black;
  border:none;
  padding:14px 18px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.info{
  margin-top:12px;
  color:#8ea5bb;
  line-height:1.8;
}

#ocrPreview{
  min-height:120px;
  font-size:22px;
  line-height:1.8;
  color:#00ff9d;
  white-space:pre-wrap;
}

#status{
  margin-top:15px;
  color:#8ea5bb;
}

.setting-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;
}

select,
input[type=range]{
  width:100%;
  margin-top:8px;
}

label{
  color:#9db3c7;
}

canvas{
  display:none;
}

</style>
</head>
<body>

<div class="container">

<h1>Movie Subtitle OCR Studio</h1>

<div class="card">
  <input type="file" id="fileInput" accept="video/*">
</div>

<div class="video-wrap" id="videoWrap">

  <div class="card">

    <div class="video-stage" id="videoStage">

      <video id="video" controls playsinline></video>

      <div class="dark" id="darkTop"></div>
      <div class="dark" id="darkBottom"></div>
      <div class="dark" id="darkLeft"></div>
      <div class="dark" id="darkRight"></div>

      <div id="cropBox">

        <div id="cropLabel">
          SUBTITLE AREA
        </div>

        <div class="handle top" id="topHandle"></div>
        <div class="handle bottom" id="bottomHandle"></div>
        <div class="handle left" id="leftHandle"></div>
        <div class="handle right" id="rightHandle"></div>

        <div id="moveArea"></div>

      </div>

    </div>

    <div class="info" id="cropInfo"></div>

    <div class="controls">
      <button onclick="presetBottom()">Bottom</button>
      <button onclick="presetMiddle()">Middle</button>
      <button onclick="presetTop()">Top</button>
      <button onclick="testOCR()">TEST OCR</button>
    </div>

  </div>

  <div class="card">

    <div class="setting-grid">

      <div>
        <label>OCR Mode</label>
        <select id="ocrMode">
          <option value="movie">Movie Subtitle</option>
          <option value="anime">Anime Subtitle</option>
        </select>
      </div>

      <div>
        <label>OCR Threshold</label>
        <input type="range" id="threshold" min="120" max="240" value="200">
      </div>

      <div>
        <label>OCR Language</label>
        <select id="ocrLang">
          <option value="ind+eng">Indonesia + English</option>
          <option value="ind">Indonesia</option>
          <option value="eng">English</option>
        </select>
      </div>

    </div>

  </div>

</div>

<div class="card">

  <h2 style="margin-bottom:20px">
    OCR PREVIEW
  </h2>

  <div id="ocrPreview">
    Belum ada OCR...
  </div>

  <div id="status"></div>

</div>

</div>

<script>

let cropXPct = 15;
let cropYPct = 76;
let cropWPct = 70;
let cropHPct = 14;

const video = document.getElementById('video');

// =========================
// FILE LOAD
// =========================

document
.getElementById('fileInput')
.addEventListener('change',e=>{

  const file = e.target.files[0];

  if(!file) return;

  video.src = URL.createObjectURL(file);

  document
  .getElementById('videoWrap')
  .style.display='block';

  video.onloadedmetadata = ()=>{

    renderCrop();
    initCropDrag();

  };

});

// =========================
// RENDER CROP
// =========================

function renderCrop(){

  const stage =
  document.getElementById('videoStage');

  const crop =
  document.getElementById('cropBox');

  const w = stage.clientWidth;
  const h = stage.clientHeight;

  const left = cropXPct/100*w;
  const top = cropYPct/100*h;
  const width = cropWPct/100*w;
  const height = cropHPct/100*h;

  crop.style.left = left+'px';
  crop.style.top = top+'px';
  crop.style.width = width+'px';
  crop.style.height = height+'px';

  // DARK OVERLAY

  const darkTop =
  document.getElementById('darkTop');

  darkTop.style.left='0px';
  darkTop.style.top='0px';
  darkTop.style.width='100%';
  darkTop.style.height=top+'px';

  const darkBottom =
  document.getElementById('darkBottom');

  darkBottom.style.left='0px';
  darkBottom.style.top=(top+height)+'px';
  darkBottom.style.width='100%';
  darkBottom.style.height=(h-(top+height))+'px';

  const darkLeft =
  document.getElementById('darkLeft');

  darkLeft.style.left='0px';
  darkLeft.style.top=top+'px';
  darkLeft.style.width=left+'px';
  darkLeft.style.height=height+'px';

  const darkRight =
  document.getElementById('darkRight');

  darkRight.style.left=(left+width)+'px';
  darkRight.style.top=top+'px';
  darkRight.style.width=(w-(left+width))+'px';
  darkRight.style.height=height+'px';

  document
  .getElementById('cropInfo')
  .innerHTML =
  `
  X:${cropXPct.toFixed(1)}%
  |
  Y:${cropYPct.toFixed(1)}%
  |
  W:${cropWPct.toFixed(1)}%
  |
  H:${cropHPct.toFixed(1)}%
  `;

}

// =========================
// CROP DRAG
// =========================

function initCropDrag(){

  const stage =
  document.getElementById('videoStage');

  const handles = {

    top:
    document.getElementById('topHandle'),

    bottom:
    document.getElementById('bottomHandle'),

    left:
    document.getElementById('leftHandle'),

    right:
    document.getElementById('rightHandle'),

    move:
    document.getElementById('moveArea')

  };

  function bind(el,type){

    let startX,startY;
    let sx,sy,sw,sh;

    function down(e){

      e.preventDefault();

      startX =
      e.touches?.[0]?.clientX ||
      e.clientX;

      startY =
      e.touches?.[0]?.clientY ||
      e.clientY;

      sx=cropXPct;
      sy=cropYPct;
      sw=cropWPct;
      sh=cropHPct;

      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);

      window.addEventListener(
        'touchmove',
        move,
        {passive:false}
      );

      window.addEventListener('touchend',up);

    }

    function move(e){

      e.preventDefault();

      const x =
      e.touches?.[0]?.clientX ||
      e.clientX;

      const y =
      e.touches?.[0]?.clientY ||
      e.clientY;

      const dx =
      (x-startX)/stage.clientWidth*100;

      const dy =
      (y-startY)/stage.clientHeight*100;

      if(type==='move'){

        cropXPct=sx+dx;
        cropYPct=sy+dy;

      }

      if(type==='top'){

        cropYPct=sy+dy;
        cropHPct=sh-dy;

      }

      if(type==='bottom'){

        cropHPct=sh+dy;

      }

      if(type==='left'){

        cropXPct=sx+dx;
        cropWPct=sw-dx;

      }

      if(type==='right'){

        cropWPct=sw+dx;

      }

      cropXPct =
      Math.max(
        0,
        Math.min(95,cropXPct)
      );

      cropYPct =
      Math.max(
        0,
        Math.min(95,cropYPct)
      );

      cropWPct =
      Math.max(
        5,
        Math.min(
          100-cropXPct,
          cropWPct
        )
      );

      cropHPct =
      Math.max(
        5,
        Math.min(
          100-cropYPct,
          cropHPct
        )
      );

      renderCrop();

    }

    function up(){

      window.removeEventListener('mousemove',move);
      window.removeEventListener('mouseup',up);
      window.removeEventListener('touchmove',move);
      window.removeEventListener('touchend',up);

    }

    el.addEventListener('mousedown',down);

    el.addEventListener(
      'touchstart',
      down,
      {passive:false}
    );

  }

  bind(handles.top,'top');
  bind(handles.bottom,'bottom');
  bind(handles.left,'left');
  bind(handles.right,'right');
  bind(handles.move,'move');

}

// =========================
// PRESETS
// =========================

function presetBottom(){

  cropXPct=15;
  cropYPct=78;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

function presetMiddle(){

  cropXPct=15;
  cropYPct=42;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

function presetTop(){

  cropXPct=15;
  cropYPct=8;
  cropWPct=70;
  cropHPct=14;

  renderCrop();

}

// =========================
// CLEAN OCR TEXT
// =========================

function cleanText(text){

  return text

  .replace(/[|¦¥¢©®™]/g,'')

  .replace(/[^ -~\n]/g,'')

  .replace(/\s+/g,' ')

  .trim();

}

// =========================
// TEST OCR
// =========================

async function testOCR(){

  if(!video.videoWidth) return;

  const status =
  document.getElementById('status');

  const preview =
  document.getElementById('ocrPreview');

  preview.innerHTML='Running OCR...';

  status.innerHTML='Preparing frame...';

  const canvas =
  document.createElement('canvas');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx =
  canvas.getContext(
    '2d',
    {willReadFrequently:true}
  );

  ctx.drawImage(video,0,0);

  const vW = video.videoWidth;
  const vH = video.videoHeight;

  const cX =
  Math.floor(cropXPct/100*vW);

  const cY =
  Math.floor(cropYPct/100*vH);

  const cW =
  Math.floor(cropWPct/100*vW);

  const cH =
  Math.floor(cropHPct/100*vH);

  const crop =
  document.createElement('canvas');

  crop.width = cW;
  crop.height = cH;

  const cc =
  crop.getContext(
    '2d',
    {willReadFrequently:true}
  );

  // BLACK BACKGROUND

  cc.fillStyle='black';
  cc.fillRect(0,0,cW,cH);

  // FILTER

  cc.filter =
  'grayscale(1) contrast(4) brightness(1.4)';

  cc.drawImage(
    canvas,
    cX,
    cY,
    cW,
    cH,
    0,
    0,
    cW,
    cH
  );

  // THRESHOLD

  const img =
  cc.getImageData(0,0,cW,cH);

  const px = img.data;

  const threshold =
  parseInt(
    document.getElementById('threshold').value
  );

  for(let i=0;i<px.length;i+=4){

    const r = px[i];
    const g = px[i+1];
    const b = px[i+2];

    const brightness =
      0.299*r+
      0.587*g+
      0.114*b;

    let val = 0;

    if(brightness > threshold){
      val = 255;
    }else{
      val = 0;
    }

    px[i]=val;
    px[i+1]=val;
    px[i+2]=val;

  }

  cc.putImageData(img,0,0);

  // UPSCALE

  const big =
  document.createElement('canvas');

  big.width = cW*5;
  big.height = cH*5;

  big
  .getContext('2d')
  .drawImage(
    crop,
    0,
    0,
    big.width,
    big.height
  );

  status.innerHTML='Loading OCR engine...';

  const worker =
  await Tesseract.createWorker(
    document.getElementById('ocrLang').value
  );

  await worker.setParameters({

    tessedit_pageseg_mode:'7',

    preserve_interword_spaces:'1',

    tessedit_char_whitelist:
    'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,?!:;\'"()- '

  });

  status.innerHTML='Running OCR...';

  const result =
  await worker.recognize(big);

  await worker.terminate();

  let text =
  cleanText(
    result.data.text
  );

  if(!text){
    text='(tidak ada teks terbaca)';
  }

  preview.innerHTML = text;

  status.innerHTML =
  `
  OCR Confidence:
  ${Math.round(result.data.confidence)}%
  `;

}

</script>

</body>
</html>
